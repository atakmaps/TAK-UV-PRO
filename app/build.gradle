apply plugin: 'com.android.application'
apply plugin: 'atak-takdev-plugin'

android {
    compileSdk 35
    namespace 'com.btechrelay.plugin'

    // Local dev speed-up: only build civDebug.
    // Disable mil + release variants so the ATAK Gradle plugin does not waste time resolving them.
    // Optional dev-only speed optimization:
    // Run with: ./gradlew assembleCivDebug -PlocalDev=true
    if (project.hasProperty("localDev")) {
        androidComponents {
            beforeVariants(selector().all()) { variantBuilder ->
                def flavor = variantBuilder.productFlavors.find { it.first == "application" }?.second
                if (!(flavor == "civ" && variantBuilder.buildType == "debug")) {
                    variantBuilder.enable = false
                }
            }
        }
    }

    buildFeatures {
        buildConfig = true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // Signing uses the ATAK SDK's publicly distributed demo keystore.
    // These are well-known credentials shipped with every copy of the SDK —
    // they are NOT secrets. For production releases, use your own keystore.
    signingConfigs {
        debug {
            storeFile file("${rootDir}/app/libs/atak-civ/android_keystore")
            storePassword "tnttnt"
            keyAlias "wintec_mapping"
            keyPassword "tnttnt"
        }
        release {
            storeFile file("${rootDir}/app/libs/atak-civ/android_keystore")
            storePassword "tnttnt"
            keyAlias "wintec_mapping"
            keyPassword "tnttnt"
        }
    }

    buildTypes {
        debug {
            debuggable true
            matchingFallbacks = ['sdk']
        }
        release {
            minifyEnabled true
            proguardFile 'proguard-gradle.txt'
            signingConfig signingConfigs.release
            matchingFallbacks = ['odk']
        }
    }

    flavorDimensions "application"

    productFlavors {
        civ {
            getIsDefault().set(true)
            dimension "application"
            manifestPlaceholders = [atakApiVersion: "com.atakmap.app@" + ATAK_VERSION + ".CIV"]
        }
        mil {
            dimension "application"
            manifestPlaceholders = [atakApiVersion: "com.atakmap.app@" + ATAK_VERSION + ".MIL"]
        }
    }

    packagingOptions {
        resources {
            excludes += ['META-INF/INDEX.LIST']
        }
        jniLibs.useLegacyPackaging true
    }

    sourceSets {
        main {
            setProperty("archivesBaseName", "ATAK-Plugin-BTECHRelay-" + PLUGIN_VERSION + "-" + getVersionName() + "-" + ATAK_VERSION)
            defaultConfig.versionCode = getVersionCode()
            defaultConfig.versionName = PLUGIN_VERSION + " (" + getVersionName() + ") - [" + ATAK_VERSION + "]"
        }
        debug.setRoot('build-types/debug')
        release.setRoot('build-types/release')
    }

    defaultConfig {
        minSdkVersion 21
        targetSdkVersion 34
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86"
        }
    }

    lint {
        abortOnError true
        checkReleaseBuilds true
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: '*.jar')
    compileOnly files("${rootDir}/app/libs/atak-civ/main.jar")
}
